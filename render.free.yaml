services:
  - type: web
    name: accevum-api
    env: node
    plan: free
    buildCommand: npm install && npm run -w packages/db build && npm run -w apps/api build
    startCommand: npm run start:api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accevum-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0

databases:
  - name: accevum-db
    plan: free
