name: Monitor Checks

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-monitor-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build DB package
        run: npm run -w packages/db build

      - name: Run monitor checks
        rune: node scripts/run-monitor-checks.cjs
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
